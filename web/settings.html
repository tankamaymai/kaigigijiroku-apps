<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>設定 | 議事録メーカー</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body data-page="settings" class="page-settings">
    <div class="app-shell">
        <header class="app-nav">
            <a href="/" class="nav-brand">議事録メーカー</a>
            <nav class="nav-links" aria-label="サイト内">
                <a href="/" class="nav-link">ホーム</a>
                <a href="/settings" class="nav-link is-active">設定</a>
                <a href="/template-manager" class="nav-link">テンプレート</a>
            </nav>
        </header>

        <main class="settings-main">
            <header class="settings-page-head">
                <h1 class="settings-page-title">設定</h1>
                <p class="settings-page-lead">AI・文字起こし・辞書をまとめて管理します。</p>
            </header>

            <div class="settings-grid">
                <section class="card card-elevated settings-block">
                    <h2 class="card-title">
                        <span class="icon" aria-hidden="true"></span>
                        AI とモデル
                    </h2>

                    <div class="form-group">
                        <label for="ai-provider">利用するAI</label>
                        <select id="ai-provider">
                            <option value="ollama">ローカルLLM (Ollama)</option>
                            <option value="openai">OpenAI (ChatGPT)</option>
                            <option value="gemini">Google Gemini</option>
                        </select>
                    </div>

                    <div id="ollama-settings">
                        <div class="form-group">
                            <label for="ollama-endpoint">Ollamaエンドポイント</label>
                            <div class="input-with-icon">
                                <input type="text" id="ollama-endpoint" value="http://localhost:11434" />
                                <button type="button" class="icon-btn" id="ollama-refresh" title="接続確認・モデル更新">更新</button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>
                                <span id="ollama-status-icon"></span>
                                <span id="ollama-status-text">未確認</span>
                            </label>
                        </div>
                    </div>

                    <div id="openai-settings" style="display: none;">
                        <div class="form-group">
                            <label for="api-key">OpenAI API Key</label>
                            <div class="input-with-icon">
                                <input type="password" id="api-key" placeholder="sk-proj-..." />
                                <button type="button" class="icon-btn toggle-visibility" data-target="api-key" title="表示切替">表示</button>
                            </div>
                        </div>
                    </div>

                    <div id="gemini-settings" style="display: none;">
                        <div class="form-group">
                            <label for="gemini-api-key">Gemini API Key</label>
                            <div class="input-with-icon">
                                <input type="password" id="gemini-api-key" placeholder="AIza..." />
                                <button type="button" class="icon-btn toggle-visibility" data-target="gemini-api-key" title="表示切替">表示</button>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="output-format">出力形式</label>
                        <select id="output-format">
                            <option value="excel" selected>Excel (.xlsx)</option>
                            <option value="text">テキスト (.txt)</option>
                            <option value="docx">Word (.docx)</option>
                        </select>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="whisper-model">Whisperモデル</label>
                            <select id="whisper-model">
                                <option value="tiny">tiny (最速)</option>
                                <option value="base">base</option>
                                <option value="small">small</option>
                                <option value="medium" selected>medium (推奨)</option>
                                <option value="large">large (高精度)</option>
                            </select>
                        </div>
                        <div class="form-group" id="model-select-group">
                            <label for="gpt-model" id="model-label">モデル</label>
                            <select id="ollama-model">
                                <option value="">Ollamaに接続して取得...</option>
                            </select>
                            <select id="gpt-model" style="display: none;">
                                <option value="gpt-4o-mini" selected>gpt-4o-mini</option>
                                <option value="gpt-4o">gpt-4o</option>
                                <option value="gpt-4-turbo">gpt-4-turbo</option>
                            </select>
                            <select id="gemini-model" style="display: none;">
                                <option value="gemini-2.0-flash" selected>Gemini 2.0 Flash</option>
                                <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
                                <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
                            </select>
                        </div>
                    </div>

                    <button type="button" class="btn btn-primary save-settings">設定を保存</button>
                </section>

                <section class="card card-elevated settings-block">
                    <h2 class="card-title">
                        <span class="icon" aria-hidden="true"></span>
                        文字起こし辞書
                    </h2>
                    <p class="card-desc">
                        読みや表記を指定すると精度が上がります。1行1エントリで「読み,漢字」の形式で入力してください。
                    </p>
                    <textarea id="dictionary-text" rows="8" placeholder="例:&#10;ふくおかわじろ,福岡和白" class="dictionary-textarea"></textarea>
                    <button type="button" class="btn btn-secondary save-dictionary">辞書を保存</button>
                </section>

                <section class="card card-elevated settings-block">
                    <h2 class="card-title">
                        <span class="icon" aria-hidden="true"></span>
                        テンプレート
                    </h2>
                    <p class="card-desc">ホーム画面で選べるテンプレート一覧です。</p>
                    <div class="template-list template-list--settings">
                        <div class="template-item" style="opacity: 0.5;">
                            <div class="template-icon"><span class="template-icon-letter">…</span></div>
                            <div class="template-info">
                                <h3>読み込み中...</h3>
                                <p>取得しています</p>
                            </div>
                        </div>
                    </div>
                    <a href="/template-manager" class="btn btn-ghost add-template">テンプレートを追加・管理</a>
                </section>
            </div>
        </main>

        <footer class="app-footer">
            <span>© 2026 議事録メーカー</span>
            <span class="app-footer__ver">v2.0.0</span>
        </footer>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
